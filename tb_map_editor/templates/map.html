<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Editor</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<style>
#map { height: 100vh; flex: 1;}
body { height: 100%; display: flex;}
div.title-container {
	display: flex;
	min-width: 160px;
	min-height: 30px;
	justify-content: center;
	font-size: 14px;
}
</style>
</head>

<body>
<div id="map"></div>
<script>

const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
	minZoom: 6,
	maxZoom: 18,
	attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
});

const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
	minZoom: 0,
	maxZoom: 18,
	attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
});

const map = L.map('map', {
	center: [21.229471957714843, -104.88745147168034],
	zoom: 10,
	layers: [osm]
});

// https://github.com/pointhi/leaflet-color-markers
function makeIcon(color) {
	return new L.Icon({
		iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
		shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
		iconSize: [20, 36],
		iconAnchor: [12, 41],
		popupAnchor: [1, -34],
		shadowSize: [36, 36]
	});
}

const icons = {
	green: makeIcon('green'),
	blue:  makeIcon('blue'),
	red:   makeIcon('red'),
	gold:  makeIcon('gold'),
	grey:  makeIcon('grey'),
};

// Layer groups
const clusterOpts = { maxClusterRadius: 80, disableClusteringAtZoom: 15 };
const layers = {
	tb:    L.markerClusterGroup(clusterOpts),
	tbsts: L.markerClusterGroup(clusterOpts),
	tbimt: L.markerClusterGroup(clusterOpts),
};
for (const lyr of Object.values(layers)) lyr.addTo(map);

const LAYER_ICON_CYCLE = [icons.blue, icons.gold, icons.red];
Object.values(layers).forEach((lyr, i) => { lyr.options.markerIcon = LAYER_ICON_CYCLE[i % LAYER_ICON_CYCLE.length]; });
layers.tb.options.editMode = false;

// --- State ---
let activeLayer   = null;
let pendingMarker = null;  // temporary marker placed via map click
let emptyTbTpl    = null;  // cached empty tollbooth template from server
let clipboard     = null;  // copied marker data for paste

// --- Utilities ---

async function postJSON(url, payload) {
	const resp = await fetch(url, {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify(payload)
	});
	if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
	return resp.json();
}

function bindMarkerPopup(marker, html, onOpen) {
	marker.unbindPopup();
	marker.bindPopup(html);
	marker.off('popupopen');
	marker.on('popupopen', onOpen);
}

function escapeHtml(str) {
	return String(str)
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#039;');
}

function isValidLat(v) { return Number.isFinite(v) && v >= -90 && v <= 90; }
function isValidLng(v) { return Number.isFinite(v) && v >= -180 && v <= 180; }

function debounce(fn, wait) {
	let t;
	return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), wait); };
}

// --- Marker popup binding ---

function editTbMarker(marker) {
	bindMarkerPopup(marker, createPopupFormHTML(marker), () => {
		attachPopupFormHandlers(marker.getPopup(), marker);
	});
}

function dragTbMarker(marker) {
	marker.dragging.enable();
	marker.on('dragend', () => {
		addInfoPopup(marker, true);
		marker.openPopup();
	});
}

function addInfoPopup(marker, moveOpt) {
	bindMarkerPopup(marker, createInfoPopupHTML(marker, moveOpt), (e) => {
		const popup     = e.popup.getElement();
		const setLink   = popup.querySelector('.set-marker-link');
		const acceptLink = popup.querySelector('.accept-move-marker');
		const cancelLink = popup.querySelector('.cancel-move-marker');

		if (setLink) {
			setLink.addEventListener('click', (ev) => {
				ev.preventDefault();
				editTbMarker(marker);
				marker.openPopup();
			});
		}

		if (acceptLink) {
			acceptLink.addEventListener('click', async () => {
				const pos = marker.getLatLng();
				const payload = { ...specialStructuredClone(marker.__data.props), tollbooth_id: marker.__data.tollbooth_id, lat: pos.lat, lng: pos.lng, info_year: marker.__data.info_year};
				try {
					await postJSON('{{ url_for("upsert_tollbooth") }}', payload);
					marker.__data.lat = pos.lat;
					marker.__data.lng = pos.lng;
					marker.closePopup();
				} catch (err) { console.warn('Save error:', err.message); }
			});
		}

		if (cancelLink) {
			cancelLink.addEventListener('click', (ev) => {
				ev.preventDefault();
				marker.closePopup();
				marker.setLatLng(new L.LatLng(marker.__data.lat, marker.__data.lng)).update();
			});
		}
	});
}


// --- Map click: place/move pending marker ---

map.on('click', async (e) => {
	if (pendingMarker === null) {
		pendingMarker = L.marker(e.latlng, { icon: icons.green, draggable: true });
		if (emptyTbTpl == null) {
			try {
				emptyTbTpl = await postJSON('{{ url_for("get_tb_tpl") }}', { source: 'tollbooth' });
			} catch (err) { console.warn('Error fetching template:', err.message); }
		}
		pendingMarker.__data = { lat: null, lng: null, props: {} };
		pendingMarker.on('dragend', () => {
			addInfoPopup(pendingMarker, false);
			pendingMarker.openPopup();
		});
	} else {
		pendingMarker.setLatLng(new L.LatLng(e.latlng.lat, e.latlng.lng)).update();
	}
	pendingMarker.__data.props = specialStructuredClone(emptyTbTpl);
	pendingMarker.__data.tollbooth_id = null;
	pendingMarker.__data.info_year = null;

	const statusEl = document.getElementById('query-status');
	if (layers[activeLayer] !== layers.tb) {
		if (statusEl) statusEl.textContent = 'Read only layer.';
	} else {
		if (!layers[activeLayer].hasLayer(pendingMarker)) {
			pendingMarker.addTo(layers[activeLayer]);
		}
	}
	addInfoPopup(pendingMarker, false);
	pendingMarker.openPopup();
});


// --- Base layers & layer control ---

const baseLayers = {
	'OpenStreetMap': osm,
	'EsriSatellite': esriSat
};
L.control.layers(baseLayers, {}, { position: 'topleft' }).addTo(map);


// --- Control panel styles ---

const controlStyle = document.createElement('style');
controlStyle.innerHTML = `
	:root{--qc-bg:rgba(255,255,255,0.98);--qc-border:#e6e6e6;--qc-accent:#0b6efd;--qc-text:#222}
	.leaflet-control-query{background:var(--qc-bg);padding:10px;width:340px;max-width:92vw;font-size:13px;z-index:1000;transition:width .25s ease,box-shadow .15s;box-shadow:0 6px 18px rgba(0,0,0,0.08);border:1px solid var(--qc-border);border-radius:8px}
	.leaflet-control-query.collapsed{width:auto;padding:6px}
	.leaflet-control-query.collapsed #control-title{display:none}
	.leaflet-control-query .query-grid{display:grid;grid-template-columns:1fr;gap:8px}
	.leaflet-control-query textarea,.leaflet-control-query select,.leaflet-control-query input[type="text"]{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ddd;border-radius:6px;font-family:monospace;background:#fff;color:var(--qc-text)}
	.leaflet-control-query textarea{min-height:90px;resize:vertical}
	.leaflet-control-query .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
	.leaflet-control-query .btn-group{display:flex;gap:6px}
	.leaflet-control-query button{border:1px solid #d0d0d0;background:#fff;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px}
	.leaflet-control-query button.btn-primary{background:var(--qc-accent);color:#fff;border-color:transparent}
	.leaflet-control-query button.btn-ghost{background:transparent;border:1px dashed #ddd}
	.leaflet-control-query label{font-size:13px;color:#444}
	.leaflet-control-query .status{font-size:12px;color:#333;margin-top:6px;white-space:pre-wrap}
	.leaflet-control-query #btn-toggle-control{margin-right:0;min-width:36px}
	.leaflet-control-query #zoom-viewer{font-size:12px;color:#666;margin-top:6px;padding:6px;background:#fbfbfb;border-radius:4px}
	.leaflet-control-query .tb-search{position:relative}
	.leaflet-control-query .tb-suggestions{position:relative;margin-top:4px;border:1px solid #e6e6e6;background:#fff;border-radius:6px;max-height:220px;overflow:auto;box-shadow:0 6px 12px rgba(0,0,0,0.06);}
	.leaflet-control-query .tb-suggestion-item{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f4f4f4}
	.leaflet-control-query .tb-suggestion-item:hover{background:#f6f8ff}
`;
document.head.appendChild(controlStyle);


// --- Query Control ---

const QueryControl = L.Control.extend({
	onAdd(map) {
		const container = L.DomUtil.create('div', 'leaflet-control-query');
		container.innerHTML = `
			<div style="display:flex;align-items:center;justify-content:space-between;gap:8px"><strong id="control-title">Query & Fetch Markers</strong><button id="btn-toggle-control" class="btn-ghost" style="padding:4px 8px;font-size:12px;cursor:pointer">−</button></div>
			<div id="control-content">
				<div class="query-grid">
					<div class="tb-search">
						<input id="tb-search" type="text" placeholder="Search tollbooth name..." />
						<div id="tb-suggestions" class="tb-suggestions" style="display:none"></div>
					</div>
					<textarea id="query-input" placeholder="Enter query (JSON or text)"></textarea>
					<select id="query-endpoints">
						{% for name, endpoint in query_endpoints.items() %}
						<option value="{{ url_for(endpoint) }}">{{ name }}</option>
						{% endfor %}
					</select>
					<div class="row">
						<label><input id="btn-checkbox-edit" type="checkbox"> Edit markers</label>
						<div class="btn-group">
							<button id="btn-send-query" class="btn-primary">Send</button>
							<button id="btn-clear-markers">Clear</button>
							<button id="btn-clear-group-layers">Clear All</button>
						</div>
					</div>
				</div>
				<div class="status" id="query-status"></div>
				<div id="zoom-viewer">Zoom level: 10</div>
				<div id="marker-props-panel" style="margin-top:8px; max-height:260px; overflow:auto; font-size:12px; background:#f9f9f9; padding:6px; border-radius:4px; display:none"></div>
			</div>
		`;

		L.DomEvent.disableClickPropagation(container);

		const queryInput   = container.querySelector('#query-input');
		const endpointSel  = container.querySelector('#query-endpoints');
		const statusEl     = container.querySelector('#query-status');
		const zoomEl       = container.querySelector('#zoom-viewer');
		const btnSend      = container.querySelector('#btn-send-query');
		const btnClear     = container.querySelector('#btn-clear-markers');
		const btnClearAll  = container.querySelector('#btn-clear-group-layers');
		const editCheckbox = container.querySelector('#btn-checkbox-edit');
		const btnToggle    = container.querySelector('#btn-toggle-control');
		const content      = container.querySelector('#control-content');

		map.on('zoomstart zoom zoomend', () => {
			if (zoomEl) zoomEl.innerHTML = `Zoom level: ${map.getZoom()}`;
		});

		btnToggle.addEventListener('click', () => {
			const hidden = content.style.display === 'none';
			content.style.display = hidden ? 'block' : 'none';
			btnToggle.textContent = hidden ? '−' : '+';
			container.classList.toggle('collapsed');
		});

		endpointSel.addEventListener('change', () => {
			activeLayer = endpointSel.options[endpointSel.selectedIndex].text;
			for (const name in layers) {
				const lyr = layers[name];
				if (!lyr) continue;
				if (name === activeLayer) { if (!map.hasLayer(lyr)) map.addLayer(lyr); }
				else                      { if (map.hasLayer(lyr))  map.removeLayer(lyr); }
			}
			if (statusEl) statusEl.textContent = `Active layer: ${activeLayer || 'none'} — ${layers[activeLayer].getLayers().length} items`;
		});

		try {
			endpointSel.dispatchEvent(new Event('change'));
		} catch (err) {
			activeLayer = endpointSel.options[endpointSel.selectedIndex].text;
			if (statusEl) statusEl.textContent = `Active layer: ${activeLayer || 'none'} — ${layers[activeLayer].getLayers().length} items`;
		}

		editCheckbox.addEventListener('click', () => {
			layers.tb.options.editMode = editCheckbox.checked;
			layers.tb.eachLayer((layer) => {
				if (!layer || !layer.__data) return;
				if (layers.tb.options.editMode) {
					layer.closePopup();
					editTbMarker(layer);
					dragTbMarker(layer);
				} else {
					layer.closePopup();
					addInfoPopup(layer, false);
					layer.dragging.disable();
				}
			});
		});

		btnSend.addEventListener('click', async () => {
			const query    = queryInput.value && queryInput.value.trim();
			const endpoint = endpointSel.value && endpointSel.value.trim();
			statusEl.textContent = 'Sending request...';
			try {
				const data = await postJSON(endpoint, { query });
				processMarkerResponse(data, query, true);
			} catch (err) {
				statusEl.textContent = `Error: ${err.message}`;
			}
		});

		btnClear.addEventListener('click', () => {
			clearMarkers();
			statusEl.textContent = 'Markers cleared';
		});

		btnClearAll.addEventListener('click', () => {
			queryInput.value = null;
			clearAllLayers();
			statusEl.textContent = 'Layers cleared';
		});

		try { initTbSearchHandlers(container); } catch (err) { console.warn('initTbSearchHandlers', err); }

		return container;
	}
});


// --- Layer management ---

function clearMarkers() {
	try { layers[activeLayer].clearLayers(); } catch (e) {}
	const panel = document.getElementById('marker-props-panel');
	if (panel) { panel.style.display = 'none'; panel.innerHTML = ''; }
}

function clearAllLayers() {
	for (const lyr of Object.values(layers)) lyr.clearLayers();
}


// --- Marker response processing ---

function processMarkerResponse(data, sourceLabel, clearLayers) {
	const coords = extractCoordinates(data);
	if (!coords.length) throw new Error('No coordinates found in response');
	const markers = addMarkersFromCoords(coords, sourceLabel, clearLayers);
	if (Array.isArray(markers) && markers.length === 1) {
		try { showMarkerProps(markers[0]); } catch (err) { console.warn('showMarkerProps error', err); }
	}
}


// --- Tollbooth autocomplete ---

const suggestions = { list: [] };

async function loadSuggestions(query) {
	try {
		const data = await postJSON('{{ url_for("fetch_tollbooths") }}', { suggestions: true, query: query.toLowerCase() });
		if (Array.isArray(data)) {
			suggestions.list = data.map(d => ({
				id:   d.tollbooth_id || d.tollbooth_id_a || d.tollbooth_id_b || d.id,
				name: d.tollbooth_name || d.name || (d.props && d.props.tollbooth_name)
			}));
		}
	} catch (err) { console.warn('Suggestions load failed', err); }
}

function renderSuggestions(filtered, box) {
	box.innerHTML = '';
	if (!filtered || !filtered.length) { box.style.display = 'none'; return; }
	for (const item of filtered) {
		const el = document.createElement('div');
		el.className = 'tb-suggestion-item';
		el.textContent = item.name || String(item.id);
		el.dataset.id = item.id;
		el.addEventListener('click', () => {
			const qEl = document.getElementById('query-input');
			if (qEl) qEl.value = el.textContent;
			try { showTollboothMarkers([el.dataset.id]); } catch (err) { console.warn(err); }
			box.style.display = 'none';
		});
		box.appendChild(el);
	}
	box.style.display = 'block';
}

function initTbSearchHandlers(container) {
	const input = container.querySelector('#tb-search');
	const box   = container.querySelector('#tb-suggestions');
	if (!input || !box) return;

	const onInput = debounce((ev) => {
		const v = ev.target.value && ev.target.value.trim().toLowerCase();
		if (!v) { renderSuggestions([], box); return; }
		renderSuggestions(suggestions.list.filter(i => (i.name || '').toLowerCase().includes(v)).slice(0, 60), box);
	}, 180);

	input.addEventListener('input', onInput);
	input.addEventListener('keyup', async (ev) => {
		if (!suggestions.list.length) await loadSuggestions(ev.target.value.trim());
		onInput(ev);
	});
	document.addEventListener('click', (ev) => {
		if (!container.contains(ev.target)) box.style.display = 'none';
	});
}


// --- Marker props panel ---

function showMarkerProps(marker) {
	const data  = marker.__data;
	const panel = document.getElementById('marker-props-panel');
	if (!panel) return;
	if (!data) { panel.style.display = 'none'; panel.innerHTML = ''; return; }
	const props = data.props || {};
	let html = `<div style="font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">`;
	html += `<span>Marker properties</span>`;
	html += `<div style="margin-top:6px;display:flex;gap:8px"><a href="#" class="toggle-tolls-link" style="font-size:12px;text-decoration:underline;cursor:pointer;color:#0066cc">tolls</a> <a href="#" class="show-neighbours-link" style="font-size:12px;text-decoration:underline;cursor:pointer;color:#0066cc">neighbours</a></div>`;
	html += `</div>`;
	html += '<table style="width:100%;font-size:12px;border-collapse:collapse">';
	for (const key of Object.keys(props)) {
		const val = props[key] == null ? '' : (typeof props[key] === 'object' ? JSON.stringify(props[key]) : String(props[key]));
		html += `<tr><td style="padding:2px 6px;border-bottom:1px solid #eee;width:40%"><strong>${escapeHtml(key)}</strong></td><td style="padding:2px 6px;border-bottom:1px solid #eee">${escapeHtml(val)}</td></tr>`;
	}
	if (!Object.keys(props).length) html += `<tr><td colspan="2" style="padding:4px;color:#666">(no properties)</td></tr>`;
	html += '</table>';
	html += `<button class="btn-copy-marker" style="padding:2px 8px;font-size:12px;cursor:pointer">Copy</button>`;
	panel.innerHTML = html;
	panel.style.display = 'block';
	panel._currentMarker = marker;
	panel._showingProperties = true;

	panel.querySelector('.btn-copy-marker').addEventListener('click', () => { copyToClipboard(marker); });
	panel.querySelector('.toggle-tolls-link').addEventListener('click', (e) => { e.preventDefault(); toggleTollsView(marker, panel); });
	panel.querySelector('.show-neighbours-link').addEventListener('click', (e) => { e.preventDefault(); showMarkerNeighbours(marker, panel); });
}

function toggleTollsView(marker, panel) {
	if (panel._showingProperties) {
		showMarkerTolls(marker, panel);
		panel._showingProperties = false;
	} else {
		showMarkerProps(marker);
	}
}

async function showMarkerTolls(marker, panel) {
	const data = marker.__data;
	if (!data || !data.tollbooth_id) {
		panel.innerHTML = '<div style="color:#666;font-size:12px">No tollbooth ID available</div>';
		return;
	}
	try {
		panel.innerHTML = '<div style="color:#999;font-size:12px">Loading tolls data...</div>';
		const tollsData = await postJSON('{{ url_for("query_tollbooths") }}', { tollbooth_id: data.tollbooth_id });

		let html = `<div style="font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">`;
		html += `<span>Tolls Data: ${tollsData.length}</span>`;
		html += `<span style="margin-top:6px"><a href="#" class="back-to-props" style="font-size:12px;text-decoration:underline;cursor:pointer;color:#0066cc">properties</a></span>`;
		html += `</div>`;

		if (Array.isArray(tollsData) && tollsData.length > 0) {
			html += '<div style="display:flex;gap:1px;border-bottom:1px solid #ccc;margin-bottom:6px;flex-wrap:wrap">';
			for (let i = 0; i < tollsData.length; i++) {
				html += `<button class="toll-tab" data-tab="${i}" data-toll-id-a="${tollsData[i].tollbooth_id_a || ''}" data-toll-id-b="${tollsData[i].tollbooth_id_b || ''}" style="padding:2px 8px;font-size:10px;cursor:pointer;border:1px solid #ccc;background:${i === 0 ? '#f0f0f0' : '#fff'};border-bottom:none;${i === 0 ? 'font-weight:bold' : ''}">Toll: ${i + 1}</button>`;
			}
			html += '</div><div class="toll-content">';
			for (let i = 0; i < tollsData.length; i++) {
				const { tollbooth_id_a, tollbooth_id_b, ...item } = tollsData[i];
				html += `<div class="toll-tab-content" data-tab="${i}" style="display:${i === 0 ? 'block' : 'none'}">`;
				html += '<table style="width:100%;font-size:11px;border-collapse:collapse">';
				for (const key of Object.keys(item)) {
					const val = item[key] == null ? '' : (typeof item[key] === 'object' ? JSON.stringify(item[key]) : String(item[key]));
					html += `<tr><td style="padding:2px 6px;border-bottom:1px solid #eee;width:40%"><strong>${escapeHtml(key)}</strong></td><td style="padding:2px 6px;border-bottom:1px solid #eee">${escapeHtml(val)}</td></tr>`;
				}
				html += '</table></div>';
			}
			html += '</div>';
		} else {
			html += '<div style="color:#666;font-size:12px;margin-top:4px">No tolls data found</div>';
		}

		panel.innerHTML = html;
		panel._showingProperties = false;

		panel.querySelectorAll('.toll-tab').forEach(tab => {
			tab.addEventListener('click', () => {
				panel.querySelectorAll('.toll-tab').forEach(t => { t.style.background = '#fff'; t.style.fontWeight = 'normal'; });
				tab.style.background = '#f0f0f0';
				tab.style.fontWeight = 'bold';
				panel.querySelectorAll('.toll-tab-content').forEach(c => { c.style.display = 'none'; });
				panel.querySelector(`div[data-tab="${tab.dataset.tab}"]`).style.display = 'block';
				const ids = [tab.dataset.tollIdA, tab.dataset.tollIdB].filter(Boolean);
				if (ids.length) showTollboothMarkers(ids);
			});
		});

		panel.querySelector('.back-to-props').addEventListener('click', (e) => { e.preventDefault(); showMarkerProps(marker); });
	} catch (err) {
		panel.innerHTML = `<div style="color:#d9534f;font-size:12px">Error loading tolls: ${escapeHtml(err.message)}</div>`;
		const back = document.createElement('div');
		back.style.marginTop = '6px';
		back.innerHTML = `<a href="#" style="font-size:12px;text-decoration:underline;cursor:pointer;color:#0066cc">back</a>`;
		panel.appendChild(back);
		back.querySelector('a').addEventListener('click', (e) => { e.preventDefault(); showMarkerProps(marker); });
	}
}

async function showTollboothMarkers(ids) {
	if (!Array.isArray(ids) || !ids.length) return;
	const statusEl = document.getElementById('query-status');
	try {
		const data = await postJSON('{{ url_for("fetch_tollbooths") }}', { query: `id:${ids.join(', ')}` });
		processMarkerResponse(data, 'query', true);
		if (statusEl) statusEl.textContent = `Displaying markers for tollbooths: ${ids.join(', ')}`;
	} catch (err) {
		if (statusEl) statusEl.textContent = `Error: ${err.message}`;
	}
}

async function showMarkerNeighbours(marker, panel) {
	const data = marker.__data;
	if (!data || !data.tollbooth_id) {
		if (panel) panel.innerHTML = '<div style="color:#666;font-size:12px">No tollbooth ID available</div>';
		return;
	}
	try {
		if (panel) panel.innerHTML = '<div style="color:#999;font-size:12px">Loading neighbours...</div>';
		const neighboursData = await postJSON('{{ url_for("tollbooth_neighbours") }}', { tollbooth_id: data.tollbooth_id });
		if (panel) {
			let html = `<div style="font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">`;
			html += `<span>Neighbours: ${Array.isArray(neighboursData) ? neighboursData.length : 0}</span>`;
			html += `<span style="font-size:12px;margin-top:6px"><a href="#" class="back-to-props" style="text-decoration:underline;cursor:pointer;color:#0066cc">properties</a></span>`;
			html += `</div>`;
			panel.innerHTML = html;
			panel._currentMarker = marker;
			panel._showingProperties = false;
			panel.querySelector('.back-to-props').addEventListener('click', (e) => { e.preventDefault(); showMarkerProps(marker); });
		}
		try { processMarkerResponse(neighboursData, 'neighbours', false); } catch (err) { console.warn('processMarkerResponse error', err); }
	} catch (err) {
		if (panel) panel.innerHTML = `<div style="color:#d9534f;font-size:12px">Error loading neighbours: ${escapeHtml(err.message)}</div>`;
	}
}


// --- Coordinate extraction ---

function extractCoordinates(data) {
	if (!data) return [];
	if (Array.isArray(data)) return data.map(parseCoordItem).filter(Boolean);
	if (typeof data === 'object') {
		for (const key of ['data', 'features', 'markers', 'points', 'coordinates', 'results']) {
			if (Array.isArray(data[key])) return data[key].map(parseCoordItem).filter(Boolean);
		}
		const c = parseCoordItem(data);
		return c ? [c] : [];
	}
	return [];
}

function parseCoordItem(item) {
	if (!item || typeof item !== 'object') return null;
	let lat, lng, source, tollbooth_id, props = {};
	for (const key in item) {
		const lk = key.toLowerCase();
		if (['lat', 'latitude'].includes(lk))              lat = parseFloat(item[key]);
		else if (['lon', 'longitude', 'lng'].includes(lk)) lng = parseFloat(item[key]);
		else if (lk === 'source')                          source = item[key];
		else if (lk === 'tollbooth_id')                    tollbooth_id = item[key];
		else if (lk === 'info_year')                       info_year = item[key];
		else                                               props[key] = item[key];
	}
	if (Number.isFinite(lat) && Number.isFinite(lng) && isValidLat(lat) && isValidLng(lng)) {
		return { lat, lng, source, props, tollbooth_id, info_year };
	}
	return null;
}


// --- Marker rendering ---

function addTbMarker(coord) {
	const isOpen = coord.props && coord.props.status !== 'closed';
	const marker = L.marker(
		[coord.lat, coord.lng],
		{
			title: coord.props && `${coord.props.tollbooth_name} [${coord.tollbooth_id}]` || '',
			icon:  isOpen ? layers[activeLayer].options.markerIcon : icons.grey
		}
	);
	marker.__data = { props: coord.props || {}, lat: coord.lat, lng: coord.lng, source: coord.source, tollbooth_id: coord.tollbooth_id, info_year: coord.info_year };
	addInfoPopup(marker, false);
	marker.addTo(layers[activeLayer]);
	marker.on('click', () => { try { showMarkerProps(marker); } catch (err) { console.warn('showMarkerProps error', err); } });
	return marker;
}

function addMarkersFromCoords(coords, sourceLabel, clearLayers) {
	if (clearLayers === true) layers[activeLayer].clearLayers();
	const markers = coords.filter(c => isValidLat(c.lat) && isValidLng(c.lng)).map(addTbMarker);
	if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds(), { maxZoom: 16 });
	const statusEl = document.getElementById('query-status');
	if (statusEl) statusEl.textContent = `Loaded ${markers.length} markers from ${sourceLabel || 'query'}`;
	return markers;
}


// --- Popup forms ---

let _popupFormId = 0;

function createPopupFormHTML(marker) {
	const data  = marker.__data;
	const pos   = marker.getLatLng();
	const id    = `marker-form-${++_popupFormId}`;
	const props = data.props || {};
	let html = `<div style="min-width:220px"><form id="${id}" class="marker-form">`;
	html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong>Marker data</strong><button type="button" class="btn-paste-marker" style="padding:2px 8px;font-size:12px;cursor:pointer" ${!clipboard ? 'disabled' : ''}>Paste</button></div>`;
	html += `<input type="hidden" name="lat" value="${escapeHtml(pos.lat)}">`;
	html += `<input type="hidden" name="lng" value="${escapeHtml(pos.lng)}">`;
	html += `<input type="hidden" name="tollbooth_id" value="${escapeHtml(data.tollbooth_id ?? '')}">`;
	html += `<input type="hidden" name="info_year" value="${escapeHtml(data.info_year ?? '')}">`;
	for (const key of Object.keys(props)) {
		const val = props[key] == null ? '' : (typeof props[key] === 'object' ? JSON.stringify(props[key]) : String(props[key]));
		html += `<div style="margin:4px 0"><label style="font-size:12px">${escapeHtml(key)}:<br><input name="${escapeHtml(key)}" value="${escapeHtml(val)}" style="width:100%"/></label></div>`;
	}
	if (!Object.keys(props).length) html += `<div style="font-size:12px;color:#666">(no properties)</div>`;
	html += `<div style="margin-top:6px"><button type="submit">Save</button> <button type="button" class="btn-close">Close</button></div>`;
	html += `<div class="form-status" style="margin-top:6px;font-size:12px;color:#333"></div>`;
	html += `</form></div>`;
	return html;
}

function createInfoPopupHTML(marker, moveOpt) {
	const data  = marker.__data;
	const props = data && data.props ? data.props : null;
	const pos   = marker.getLatLng();
	let html = '<div style="min-width:160px;font-size:12px">';
	if (data.tollbooth_id) {
		html += `<div class="title-container"><strong>${escapeHtml(`${props.tollbooth_name} [${data.tollbooth_id}]`)}</strong></div>`;
		if (moveOpt) {
			html += '<div style="display:inline-grid;align-content:center;justify-content:center">';
			html += '<div><a href="#" class="accept-move-marker">Save here?</a></div>';
			html += '<div><a href="#" class="cancel-move-marker">Cancel</a></div>';
			html += '</div>';
		}
	} else {
		html += `<div class="title-container"><a href="#" class="set-marker-link">Add Marker</a></div>`;
	}
	html += `<div>${pos.lat}, ${pos.lng}</div></div>`;
	return html;
}

function copyToClipboard(marker) {
	if (!marker || !marker.__data) return;
	clipboard = specialStructuredClone(marker.__data);
	alert(`Copied marker data (ID: ${marker.__data.tollbooth_id || 'new'})`);
	document.querySelectorAll('.btn-paste-marker').forEach(btn => { btn.disabled = false; });
}

function pasteFromClipboard(formId) {
	const form = document.getElementById(formId);
	if (!form || !clipboard) return;
	for (const [key, val] of Object.entries(clipboard.props || {})) {
		const input = form.querySelector(`input[name="${key}"]`);
		if (input) input.value = val == null ? '' : String(val);
	}
}

function attachPopupFormHandlers(popup, marker) {
	const el = popup.getElement();
	if (!el) return;
	const form = el.querySelector('form.marker-form');
	if (!form || form._attached) return;
	form._attached = true;
	const status = el.querySelector('.form-status');

	el.querySelector('.btn-paste-marker').addEventListener('click', () => { pasteFromClipboard(form.id); });

	form.addEventListener('submit', async (ev) => {
		ev.preventDefault();
		const obj = {};
		for (const [k, v] of new FormData(form).entries()) obj[k] = v === '' ? null : v;
		marker.__data.props = Object.fromEntries(Object.entries(obj).filter(([k]) => !['lat', 'lng', 'tollbooth_id', 'info_year'].includes(k)));
		marker.__data.lat = obj.lat;
		marker.__data.lng = obj.lng;
		obj.tollbooth_id = obj.tollbooth_id || null;
		if (status) status.textContent = 'Saving...';
		try {
			const resp = await fetch('{{ url_for("upsert_tollbooth") }}', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(obj)
			});
			const respData = await resp.json();
			if (!resp.ok) throw new Error(resp.statusText);
			if (status) status.textContent = 'Saved to server';
			marker.__data.tollbooth_id = respData.tollbooth_id;
			marker.__data.info_year = respData.info_year;
			try { showMarkerProps(marker); } catch (err) { console.warn('showMarkerProps error', err); }
			//rebuild marker to clean up data in popup
			const newMarker = addTbMarker(marker.__data);
			marker.closePopup();
			addInfoPopup(newMarker, false);
			if (layers[activeLayer].hasLayer(marker)) layers[activeLayer].removeLayer(marker);
		} catch (err) { if (status) status.textContent = `Save error: ${err.message}`; }
	});

	el.querySelector('.btn-close').addEventListener('click', () => {
		marker.closePopup();
		if (!layers.tb.options.editMode) addInfoPopup(marker, false);
	});
}


// --- Deep clone ---

function specialStructuredClone(data) {
	try {
		if (typeof structuredClone === 'function') return structuredClone(data);
	} catch (err) {}

	const seen = new WeakMap();
	function _clone(val) {
		if (val === null || typeof val !== 'object') {
			if (typeof val === 'function') throw new Error('Cannot clone function');
			return val;
		}
		if (seen.has(val)) return seen.get(val);
		if (val instanceof Date)        return new Date(val.getTime());
		if (val instanceof RegExp)      return new RegExp(val.source, val.flags);
		if (val instanceof ArrayBuffer) { const c = val.slice(0); seen.set(val, c); return c; }
		if (ArrayBuffer.isView(val)) {
			if (val instanceof DataView) {
				const dv = new DataView(val.buffer.slice(0), val.byteOffset, val.byteLength);
				seen.set(val, dv); return dv;
			}
			const copy = new val.constructor(val.buffer.slice(0), val.byteOffset, val.length);
			seen.set(val, copy); return copy;
		}
		if (val instanceof Map) {
			const m = new Map(); seen.set(val, m);
			for (const [k, v] of val.entries()) m.set(_clone(k), _clone(v));
			return m;
		}
		if (val instanceof Set) {
			const s = new Set(); seen.set(val, s);
			for (const v of val.values()) s.add(_clone(v));
			return s;
		}
		if (Array.isArray(val)) {
			const arr = []; seen.set(val, arr);
			for (let i = 0; i < val.length; i++) arr[i] = _clone(val[i]);
			return arr;
		}
		if (typeof Blob !== 'undefined' && val instanceof Blob) {
			try { const b = val.slice(0, val.size, val.type); seen.set(val, b); return b; }
			catch (e) { throw new Error('Cannot clone Blob'); }
		}
		if (typeof Node !== 'undefined' && val instanceof Node) throw new Error('Cannot clone DOM Node');
		const proto = Object.getPrototypeOf(val);
		const out = Object.create(proto);
		seen.set(val, out);
		for (const key of [...Object.getOwnPropertyNames(val), ...Object.getOwnPropertySymbols(val)]) {
			const desc = Object.getOwnPropertyDescriptor(val, key);
			if (!desc) continue;
			if ('value' in desc) {
				if (typeof desc.value === 'function') throw new Error('Cannot clone function');
				desc.value = _clone(desc.value);
			}
			Object.defineProperty(out, key, desc);
		}
		return out;
	}
	return _clone(data);
}

(new QueryControl({ position: 'topright' })).addTo(map);
window.clearMarkers = clearMarkers;
