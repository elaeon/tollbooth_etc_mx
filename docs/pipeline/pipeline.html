  placeholder.style.display = 'none';
  content.style.display = 'flex';

  content.style.gap = '12px';

  document.getElementById('p-badge').className = `badge badge-${d.type}`;
  document.getElementById('p-label').textContent = d.label;

  const modelGroup = document.getElementById('p-model-group');
  const modelPathGroup = document.getElementById('p-model-path-group');
  if (d.model) {
    modelGroup.style.display = '';
    modelPathGroup.style.display = '';
    document.getElementById('p-model').textContent = d.model;
    document.getElementById('p-model-path').textContent = d.model_path;
  } else {
    modelGroup.style.display = 'none';
    modelPathGroup.style.display = 'none';
  }

  const schemaGroup = document.getElementById('p-schema-group');
  const schemaBody  = document.getElementById('p-schema-body');
  const schema = d.schema || {};
  const entries = Object.entries(schema);
  if (entries.length) {
    schemaGroup.style.display = '';
    schemaBody.innerHTML = entries.map(([f, t]) =>
      `<tr><td class="field-name">${f}</td><td class="field-type">${t}</td></tr>`
    ).join('');
  } else {
    schemaGroup.style.display = 'none';
  }

  // highlight connected edges
  cy.edges().removeClass('highlighted');
  node.connectedEdges().addClass('highlighted');
}

cy.on('tap', 'node', evt => showPanel(evt.target));
cy.on('tap', evt => {
  if (evt.target === cy) {
    cy.edges().removeClass('highlighted');
    placeholder.style.display = '';
    content.style.display = 'none';
  }
});

cy.fit(undefined, 30);
</script>
</body>
</html>
